services:
  mosaic-test:
    build: .
    entrypoint: []
    command: ['python', '-m', 'unittest', 'test.test_mosaic']
    volumes:
      - ./fim_mosaicker:/app
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_DEFAULT_REGION

  inundate-test:
    build: .
    entrypoint: []
    command: ['python', '-m', 'unittest', 'test.test_inundate']
    volumes:
      - ./hand_inundator:/app
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_DEFAULT_REGION
